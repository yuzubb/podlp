name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/podlp
    permissions:
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 💡 Node.js のセットアップを追加
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 💡 JS側の依存関係（youtube-po-token-generator）をインストール
      - name: Install Node.js dependencies
        run: npm ci

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
